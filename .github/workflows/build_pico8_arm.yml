name: Build PICO-8 ARM binary

on:
  push:
    paths:
      - 'source/PICO-8/**'
      - '.github/workflows/build_pico8_arm.yml'
  workflow_dispatch:

jobs:
  build-arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build PICO-8 ARM binary in container
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/build \
            -w /build/source/PICO-8 \
            arm32v7/debian:bullseye-slim \
            bash -c '
              set -e

              apt-get update -qq
              apt-get install -y -qq g++ cmake make wget libasound2-dev >/dev/null 2>&1

              # SDL 1.2.15 static
              SDL_PREFIX=/tmp/sdl12
              echo "=== Building SDL 1.2.15 (static, fbcon, ALSA) ==="
              cd /tmp
              wget -q https://www.libsdl.org/release/SDL-1.2.15.tar.gz
              tar xzf SDL-1.2.15.tar.gz
              cd SDL-1.2.15
              ./configure \
                --prefix=$SDL_PREFIX \
                --disable-video-x11 \
                --disable-video-opengl \
                --disable-cdrom \
                --disable-shared \
                --enable-static \
                --disable-pulseaudio \
                --disable-esd \
                --enable-alsa \
                --enable-video-fbcon \
                --quiet
              make -j$(nproc) --quiet
              make install --quiet
              echo "SDL built: $(du -h $SDL_PREFIX/lib/libSDL.a | cut -f1)"

              # PICO-8
              echo "=== Building PICO-8 ==="
              cd /build/source/PICO-8
              mkdir -p build-arm && cd build-arm
              cmake .. \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-mcpu=cortex-a9 -mtune=cortex-a9 -mfloat-abi=hard -mfpu=neon" \
                -DCMAKE_CXX_FLAGS="-mcpu=cortex-a9 -mtune=cortex-a9 -mfloat-abi=hard -mfpu=neon" \
                -DSDL_STATIC_PREFIX=$SDL_PREFIX
              make -j$(nproc)

              echo "=== Binary info ==="
              ls -lh PICO-8
              file PICO-8 || true
            '

      - name: Upload PICO-8 binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PICO-8-arm-binary
          path: source/PICO-8/build-arm/PICO-8
          if-no-files-found: error
