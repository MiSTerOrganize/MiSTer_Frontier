name: Build OpenBOR_4086 ARM binary

on:
  push:
    paths:
      - 'source/OpenBOR_4086/**'
      - '.github/workflows/build_openbor_4086_arm.yml'
  workflow_dispatch:

jobs:
  build-arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build OpenBOR_4086 ARM binary in container
        run: |
          chmod +x source/OpenBOR_4086/.github/scripts/build_mister_arm.sh
          # Mount source/OpenBOR_4086 as /build so the existing script works unchanged
          # (it expects /build/src, /build/patches, /build/.github/scripts/, etc.)
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}/source/OpenBOR_4086:/build \
            -w /tmp \
            arm32v7/debian:bullseye-slim \
            bash /build/.github/scripts/build_mister_arm.sh

      - name: Verify binary
        run: |
          ls -lh source/OpenBOR_4086/OpenBOR
          file source/OpenBOR_4086/OpenBOR || true

      - name: Upload OpenBOR_4086 binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenBOR_4086-arm-binary
          path: source/OpenBOR_4086/OpenBOR
          if-no-files-found: error
